# File: skills/dev/task-planning.yaml
schemaVersion: "1.0.0"
id: "dev.task-planning"
name: "Task Planning"
version: "1.0.0"
description: |
  Breaks down user requests into executable implementation steps for downstream agents.
  Analyzes requirements, identifies dependencies, and creates structured plans with
  clear acceptance criteria and estimated effort.
tags:
  - "planning"
  - "requirements"
  - "task-breakdown"
  - "implementation"
role: "planner"
inputSchema:
  type: "object"
  required: ["goal"]
  properties:
    goal:
      type: "string"
      description: "The user's high-level objective or feature request"
    context:
      type: "object"
      description: "Additional context about the codebase, constraints, or preferences"
      properties:
        techStack:
          type: "array"
          items:
            type: "string"
          description: "Technologies and frameworks in use"
        existingFiles:
          type: "array"
          items:
            type: "string"
          description: "Relevant existing files in the codebase"
        constraints:
          type: "array"
          items:
            type: "string"
          description: "Constraints like time, dependencies, or architectural decisions"
outputSchema:
  type: "object"
  required: ["plan", "steps"]
  properties:
    plan:
      type: "string"
      description: "High-level summary of the implementation approach"
    steps:
      type: "array"
      items:
        type: "object"
        required: ["id", "description", "acceptanceCriteria"]
        properties:
          id:
            type: "string"
            description: "Unique identifier for this step"
          description:
            type: "string"
            description: "What this step accomplishes"
          acceptanceCriteria:
            type: "array"
            items:
              type: "string"
            description: "Specific conditions that define success for this step"
          estimatedEffort:
            type: "string"
            enum: ["small", "medium", "large"]
            description: "Rough effort estimate"
          dependencies:
            type: "array"
            items:
              type: "string"
            description: "IDs of steps that must complete before this one"
          assignedRole:
            type: "string"
            enum: ["planner", "coder", "reviewer"]
            description: "Which agent role should execute this step"
    risks:
      type: "array"
      items:
        type: "object"
        properties:
          description:
            type: "string"
          mitigation:
            type: "string"
    totalEstimatedEffort:
      type: "string"
      description: "Summary of overall effort required"
capabilities:
  - "requirement-analysis"
  - "task-decomposition"
  - "dependency-identification"
  - "acceptance-criteria-definition"
preferredRuntimeTargets:
  - "claude-code"
routingHints:
  - "first-step-in-pipeline"
  - "analyzes-requirements-before-coding"
promptRef: "prompts/dev/planner.md"
securityNotes:
  - "Does not execute code or make filesystem changes"
  - "Outputs structured plans only - no shell commands"
metadata:
  author: "tenclaw-framework"
  domain: "software-delivery"
  usageExamples:
    - input:
        goal: "Add user authentication to the API"
        context:
          techStack: ["Node.js", "Express", "JWT"]
      expectedOutput: "Implementation plan with auth middleware, routes, and tests"
